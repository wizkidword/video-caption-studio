name: Release Windows EXE

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install FFmpeg (for ffprobe bundling)
        shell: powershell
        run: |
          choco install ffmpeg -y
          $ffprobe = (Get-Command ffprobe.exe).Source
          echo "VCS_FFPROBE_PATH=$ffprobe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build EXE
        env:
          VCS_FFPROBE_PATH: ${{ env.VCS_FFPROBE_PATH }}
        run: |
          pyinstaller --noconfirm video-caption-studio.spec

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: video-caption-studio-windows-exe
          path: dist/video-caption-studio.exe
          if-no-files-found: error

      - name: Publish GitHub Release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/video-caption-studio.exe
          generate_release_notes: true
          overwrite_files: true
